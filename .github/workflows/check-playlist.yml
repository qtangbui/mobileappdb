name: Check Playlist for New Videos

on:
  schedule:
    # 8 times/day, focused on morning & evening (UTC times)
    # Vietnam = UTC+7, so UTC 0:00 = VN 7:00 AM, UTC 14:00 = VN 9:00 PM
    - cron: "0 0 * * *"    # VN 7:00 AM
    - cron: "0 2 * * *"    # VN 9:00 AM
    - cron: "0 5 * * *"    # VN 12:00 PM
    - cron: "0 8 * * *"    # VN 3:00 PM
    - cron: "0 10 * * *"   # VN 5:00 PM
    - cron: "0 12 * * *"   # VN 7:00 PM
    - cron: "0 14 * * *"   # VN 9:00 PM
    - cron: "0 16 * * *"   # VN 11:00 PM
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Check playlists
        id: check
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/check-playlist.js

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*/playlist-meta.json
          git commit -m "chore: update playlist-meta (new video detected)"
          git push
